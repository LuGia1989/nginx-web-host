version: "3.8"
services:
  portal:
    build: .
    container_name: ai-portal
    ports:
      - "8888:80"
      # ── Uncomment for HTTPS ──
      # - "443:443"
    restart: unless-stopped
    environment:
      # ── Set your URLs here ──
      #PORTAL_DOMAIN: "portal.example.com"
      PORTAL_URL: "http://<web-host-server>:8888"
      APP1_URL: "http://<app1-server>:5005"
      APP2_URL: "http://<app2-server>:5050"
      APP3_URL: "http://<app3-server>:5070"
      APP4_URL: "http://<app4-server>:8000"
    # ── Uncomment volumes for SSL certificates ──
    # volumes:
    #   - ./ssl/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
    #   - ./ssl/privkey.pem:/etc/nginx/ssl/privkey.pem:ro

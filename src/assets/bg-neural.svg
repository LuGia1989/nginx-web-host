<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </radialGradient>
    <radialGradient id="bgGrad2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="rgba(124,58,237,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="bgGrad3" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="rgba(0,212,255,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="glowSm">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="glowMd">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <filter id="glowLg">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="glowXl">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>

    <!-- Circuit trace pattern -->
    <pattern id="gridLines" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="80" y2="0" stroke="rgba(0,212,255,0.03)" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="0" y2="80" stroke="rgba(0,212,255,0.03)" stroke-width="0.5"/>
    </pattern>

    <!-- Hex pattern -->
    <pattern id="hexGrid" x="0" y="0" width="120" height="104" patternUnits="userSpaceOnUse">
      <polygon points="60,2 110,28 110,76 60,102 10,76 10,28" fill="none" stroke="rgba(0,212,255,0.02)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1920" height="1080" fill="url(#bgGrad1)"/>
  <rect width="1920" height="1080" fill="url(#bgGrad2)"/>
  <rect width="1920" height="1080" fill="url(#bgGrad3)"/>

  <!-- Grid overlay -->
  <rect width="1920" height="1080" fill="url(#gridLines)"/>
  <rect width="1920" height="1080" fill="url(#hexGrid)" opacity="0.5"/>

  <!-- Large ambient glow spots -->
  <circle cx="350" cy="300" r="250" fill="rgba(0,212,255,0.015)" filter="url(#glowXl)"/>
  <circle cx="1500" cy="750" r="300" fill="rgba(124,58,237,0.015)" filter="url(#glowXl)"/>
  <circle cx="960" cy="540" r="200" fill="rgba(16,185,129,0.01)" filter="url(#glowXl)"/>

  <!-- ============ NEURAL NETWORK LAYER 1 (deep background, very faint) ============ -->
  <g opacity="0.15">
    <!-- Connections -->
    <line x1="120" y1="180" x2="350" y2="290" stroke="rgba(0,212,255,0.4)" stroke-width="0.5"/>
    <line x1="350" y1="290" x2="580" y2="210" stroke="rgba(0,212,255,0.3)" stroke-width="0.5"/>
    <line x1="580" y1="210" x2="720" y2="380" stroke="rgba(0,212,255,0.3)" stroke-width="0.5"/>
    <line x1="350" y1="290" x2="480" y2="450" stroke="rgba(124,58,237,0.3)" stroke-width="0.5"/>
    <line x1="480" y1="450" x2="720" y2="380" stroke="rgba(124,58,237,0.3)" stroke-width="0.5"/>
    <line x1="120" y1="180" x2="200" y2="420" stroke="rgba(0,212,255,0.2)" stroke-width="0.5"/>
    <line x1="200" y1="420" x2="480" y2="450" stroke="rgba(0,212,255,0.2)" stroke-width="0.5"/>
    <line x1="720" y1="380" x2="900" y2="280" stroke="rgba(0,212,255,0.3)" stroke-width="0.5"/>
    <line x1="580" y1="210" x2="900" y2="280" stroke="rgba(124,58,237,0.2)" stroke-width="0.5"/>
    <!-- Nodes -->
    <circle cx="120" cy="180" r="4" fill="rgba(0,212,255,0.6)" filter="url(#glowSm)"/>
    <circle cx="350" cy="290" r="5" fill="rgba(0,212,255,0.7)" filter="url(#glowSm)"/>
    <circle cx="580" cy="210" r="4" fill="rgba(124,58,237,0.6)" filter="url(#glowSm)"/>
    <circle cx="720" cy="380" r="5" fill="rgba(0,212,255,0.6)" filter="url(#glowSm)"/>
    <circle cx="480" cy="450" r="3" fill="rgba(124,58,237,0.5)" filter="url(#glowSm)"/>
    <circle cx="200" cy="420" r="3" fill="rgba(0,212,255,0.4)" filter="url(#glowSm)"/>
    <circle cx="900" cy="280" r="4" fill="rgba(0,212,255,0.5)" filter="url(#glowSm)"/>
  </g>

  <!-- ============ NEURAL NETWORK LAYER 2 (mid background) ============ -->
  <g opacity="0.2">
    <!-- Connections -->
    <line x1="1050" y1="150" x2="1280" y2="260" stroke="rgba(124,58,237,0.4)" stroke-width="0.6"/>
    <line x1="1280" y1="260" x2="1500" y2="180" stroke="rgba(124,58,237,0.3)" stroke-width="0.6"/>
    <line x1="1500" y1="180" x2="1700" y2="320" stroke="rgba(0,212,255,0.3)" stroke-width="0.6"/>
    <line x1="1280" y1="260" x2="1400" y2="430" stroke="rgba(0,212,255,0.3)" stroke-width="0.6"/>
    <line x1="1400" y1="430" x2="1700" y2="320" stroke="rgba(124,58,237,0.3)" stroke-width="0.6"/>
    <line x1="1050" y1="150" x2="1150" y2="380" stroke="rgba(0,212,255,0.2)" stroke-width="0.6"/>
    <line x1="1150" y1="380" x2="1400" y2="430" stroke="rgba(0,212,255,0.2)" stroke-width="0.6"/>
    <line x1="1700" y1="320" x2="1850" y2="220" stroke="rgba(124,58,237,0.3)" stroke-width="0.6"/>
    <line x1="1500" y1="180" x2="1850" y2="220" stroke="rgba(0,212,255,0.2)" stroke-width="0.6"/>
    <line x1="1280" y1="260" x2="1150" y2="380" stroke="rgba(124,58,237,0.2)" stroke-width="0.6"/>
    <!-- Nodes -->
    <circle cx="1050" cy="150" r="4" fill="rgba(124,58,237,0.7)" filter="url(#glowSm)"/>
    <circle cx="1280" cy="260" r="6" fill="rgba(124,58,237,0.8)" filter="url(#glowSm)"/>
    <circle cx="1500" cy="180" r="4" fill="rgba(0,212,255,0.6)" filter="url(#glowSm)"/>
    <circle cx="1700" cy="320" r="5" fill="rgba(0,212,255,0.7)" filter="url(#glowSm)"/>
    <circle cx="1400" cy="430" r="3" fill="rgba(124,58,237,0.5)" filter="url(#glowSm)"/>
    <circle cx="1150" cy="380" r="3" fill="rgba(0,212,255,0.5)" filter="url(#glowSm)"/>
    <circle cx="1850" cy="220" r="4" fill="rgba(124,58,237,0.5)" filter="url(#glowSm)"/>
  </g>

  <!-- ============ NEURAL NETWORK LAYER 3 (bottom region) ============ -->
  <g opacity="0.18">
    <line x1="200" y1="650" x2="450" y2="720" stroke="rgba(16,185,129,0.4)" stroke-width="0.5"/>
    <line x1="450" y1="720" x2="680" y2="640" stroke="rgba(16,185,129,0.3)" stroke-width="0.5"/>
    <line x1="680" y1="640" x2="880" y2="780" stroke="rgba(0,212,255,0.3)" stroke-width="0.5"/>
    <line x1="450" y1="720" x2="600" y2="880" stroke="rgba(16,185,129,0.2)" stroke-width="0.5"/>
    <line x1="600" y1="880" x2="880" y2="780" stroke="rgba(0,212,255,0.2)" stroke-width="0.5"/>
    <line x1="200" y1="650" x2="320" y2="850" stroke="rgba(16,185,129,0.2)" stroke-width="0.5"/>
    <line x1="320" y1="850" x2="600" y2="880" stroke="rgba(0,212,255,0.2)" stroke-width="0.5"/>
    <line x1="880" y1="780" x2="1100" y2="700" stroke="rgba(16,185,129,0.3)" stroke-width="0.5"/>
    <circle cx="200" cy="650" r="4" fill="rgba(16,185,129,0.6)" filter="url(#glowSm)"/>
    <circle cx="450" cy="720" r="5" fill="rgba(16,185,129,0.7)" filter="url(#glowSm)"/>
    <circle cx="680" cy="640" r="4" fill="rgba(0,212,255,0.5)" filter="url(#glowSm)"/>
    <circle cx="880" cy="780" r="5" fill="rgba(0,212,255,0.6)" filter="url(#glowSm)"/>
    <circle cx="600" cy="880" r="3" fill="rgba(16,185,129,0.4)" filter="url(#glowSm)"/>
    <circle cx="320" cy="850" r="3" fill="rgba(0,212,255,0.4)" filter="url(#glowSm)"/>
    <circle cx="1100" cy="700" r="4" fill="rgba(16,185,129,0.5)" filter="url(#glowSm)"/>
  </g>

  <!-- ============ NEURAL NETWORK LAYER 4 (bottom-right) ============ -->
  <g opacity="0.16">
    <line x1="1200" y1="620" x2="1420" y2="700" stroke="rgba(245,158,11,0.3)" stroke-width="0.5"/>
    <line x1="1420" y1="700" x2="1650" y2="620" stroke="rgba(245,158,11,0.3)" stroke-width="0.5"/>
    <line x1="1650" y1="620" x2="1800" y2="780" stroke="rgba(124,58,237,0.3)" stroke-width="0.5"/>
    <line x1="1420" y1="700" x2="1550" y2="860" stroke="rgba(245,158,11,0.2)" stroke-width="0.5"/>
    <line x1="1550" y1="860" x2="1800" y2="780" stroke="rgba(124,58,237,0.2)" stroke-width="0.5"/>
    <line x1="1200" y1="620" x2="1300" y2="830" stroke="rgba(245,158,11,0.2)" stroke-width="0.5"/>
    <line x1="1300" y1="830" x2="1550" y2="860" stroke="rgba(124,58,237,0.2)" stroke-width="0.5"/>
    <circle cx="1200" cy="620" r="4" fill="rgba(245,158,11,0.6)" filter="url(#glowSm)"/>
    <circle cx="1420" cy="700" r="5" fill="rgba(245,158,11,0.7)" filter="url(#glowSm)"/>
    <circle cx="1650" cy="620" r="4" fill="rgba(124,58,237,0.5)" filter="url(#glowSm)"/>
    <circle cx="1800" cy="780" r="5" fill="rgba(124,58,237,0.6)" filter="url(#glowSm)"/>
    <circle cx="1550" cy="860" r="3" fill="rgba(245,158,11,0.4)" filter="url(#glowSm)"/>
    <circle cx="1300" cy="830" r="3" fill="rgba(124,58,237,0.4)" filter="url(#glowSm)"/>
  </g>

  <!-- ============ CENTRAL BRAIN / HUB ============ -->
  <g opacity="0.25">
    <!-- Outer ring -->
    <circle cx="960" cy="540" r="120" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="1" stroke-dasharray="8,12"/>
    <circle cx="960" cy="540" r="90" fill="none" stroke="rgba(124,58,237,0.1)" stroke-width="0.8" stroke-dasharray="6,10"/>
    <circle cx="960" cy="540" r="60" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="0.8"/>

    <!-- Central glow -->
    <circle cx="960" cy="540" r="40" fill="rgba(0,212,255,0.03)" filter="url(#glowLg)"/>
    <circle cx="960" cy="540" r="15" fill="rgba(0,212,255,0.06)" filter="url(#glowMd)"/>
    <circle cx="960" cy="540" r="5" fill="rgba(0,212,255,0.2)"/>

    <!-- Spokes radiating from center -->
    <line x1="960" y1="540" x2="960" y2="380" stroke="rgba(0,212,255,0.08)" stroke-width="0.5"/>
    <line x1="960" y1="540" x2="960" y2="700" stroke="rgba(0,212,255,0.08)" stroke-width="0.5"/>
    <line x1="960" y1="540" x2="800" y2="540" stroke="rgba(124,58,237,0.08)" stroke-width="0.5"/>
    <line x1="960" y1="540" x2="1120" y2="540" stroke="rgba(124,58,237,0.08)" stroke-width="0.5"/>
    <line x1="960" y1="540" x2="847" y2="427" stroke="rgba(0,212,255,0.06)" stroke-width="0.5"/>
    <line x1="960" y1="540" x2="1073" y2="653" stroke="rgba(0,212,255,0.06)" stroke-width="0.5"/>
    <line x1="960" y1="540" x2="1073" y2="427" stroke="rgba(124,58,237,0.06)" stroke-width="0.5"/>
    <line x1="960" y1="540" x2="847" y2="653" stroke="rgba(124,58,237,0.06)" stroke-width="0.5"/>

    <!-- Spoke endpoints -->
    <circle cx="960" cy="380" r="3" fill="rgba(0,212,255,0.3)" filter="url(#glowSm)"/>
    <circle cx="960" cy="700" r="3" fill="rgba(0,212,255,0.3)" filter="url(#glowSm)"/>
    <circle cx="800" cy="540" r="3" fill="rgba(124,58,237,0.3)" filter="url(#glowSm)"/>
    <circle cx="1120" cy="540" r="3" fill="rgba(124,58,237,0.3)" filter="url(#glowSm)"/>
    <circle cx="847" cy="427" r="2" fill="rgba(0,212,255,0.2)" filter="url(#glowSm)"/>
    <circle cx="1073" cy="653" r="2" fill="rgba(0,212,255,0.2)" filter="url(#glowSm)"/>
    <circle cx="1073" cy="427" r="2" fill="rgba(124,58,237,0.2)" filter="url(#glowSm)"/>
    <circle cx="847" cy="653" r="2" fill="rgba(124,58,237,0.2)" filter="url(#glowSm)"/>
  </g>

  <!-- ============ CIRCUIT TRACES ============ -->
  <g opacity="0.12">
    <!-- Horizontal traces -->
    <path d="M0,200 H150 L170,220 H400" stroke="rgba(0,212,255,0.3)" stroke-width="0.8" fill="none"/>
    <path d="M0,500 H80 L100,520 H300 L320,500 H500" stroke="rgba(124,58,237,0.25)" stroke-width="0.8" fill="none"/>
    <path d="M1920,350 H1750 L1730,370 H1500" stroke="rgba(0,212,255,0.25)" stroke-width="0.8" fill="none"/>
    <path d="M1920,680 H1800 L1780,660 H1600" stroke="rgba(124,58,237,0.3)" stroke-width="0.8" fill="none"/>
    <path d="M0,800 H120 L140,780 H350" stroke="rgba(16,185,129,0.25)" stroke-width="0.8" fill="none"/>
    <path d="M1920,900 H1770 L1750,880 H1550" stroke="rgba(245,158,11,0.2)" stroke-width="0.8" fill="none"/>

    <!-- Trace junction dots -->
    <circle cx="170" cy="220" r="2.5" fill="rgba(0,212,255,0.5)"/>
    <circle cx="100" cy="520" r="2.5" fill="rgba(124,58,237,0.5)"/>
    <circle cx="320" cy="500" r="2.5" fill="rgba(124,58,237,0.4)"/>
    <circle cx="1730" cy="370" r="2.5" fill="rgba(0,212,255,0.4)"/>
    <circle cx="1780" cy="660" r="2.5" fill="rgba(124,58,237,0.5)"/>
    <circle cx="140" cy="780" r="2.5" fill="rgba(16,185,129,0.5)"/>
    <circle cx="1750" cy="880" r="2.5" fill="rgba(245,158,11,0.4)"/>
  </g>

  <!-- ============ FLOATING PARTICLES ============ -->
  <g opacity="0.3">
    <circle cx="85" cy="95" r="1.5" fill="rgba(0,212,255,0.6)"/>
    <circle cx="290" cy="55" r="1" fill="rgba(124,58,237,0.5)"/>
    <circle cx="520" cy="120" r="1.2" fill="rgba(0,212,255,0.4)"/>
    <circle cx="750" cy="80" r="1" fill="rgba(16,185,129,0.5)"/>
    <circle cx="1100" cy="60" r="1.5" fill="rgba(124,58,237,0.5)"/>
    <circle cx="1350" cy="110" r="1" fill="rgba(0,212,255,0.4)"/>
    <circle cx="1600" cy="50" r="1.2" fill="rgba(245,158,11,0.5)"/>
    <circle cx="1830" cy="100" r="1" fill="rgba(0,212,255,0.4)"/>
    <circle cx="150" cy="980" r="1.2" fill="rgba(0,212,255,0.5)"/>
    <circle cx="400" cy="1020" r="1" fill="rgba(16,185,129,0.4)"/>
    <circle cx="700" cy="960" r="1.5" fill="rgba(124,58,237,0.5)"/>
    <circle cx="1000" cy="1010" r="1" fill="rgba(0,212,255,0.4)"/>
    <circle cx="1300" cy="970" r="1.2" fill="rgba(245,158,11,0.4)"/>
    <circle cx="1600" cy="1000" r="1" fill="rgba(124,58,237,0.5)"/>
    <circle cx="1850" cy="960" r="1.5" fill="rgba(0,212,255,0.4)"/>
    <!-- Mid-area particles -->
    <circle cx="50" cy="450" r="1" fill="rgba(0,212,255,0.4)"/>
    <circle cx="1880" cy="480" r="1" fill="rgba(124,58,237,0.4)"/>
    <circle cx="650" cy="500" r="0.8" fill="rgba(16,185,129,0.3)"/>
    <circle cx="1250" cy="550" r="0.8" fill="rgba(245,158,11,0.3)"/>
    <circle cx="430" cy="340" r="1" fill="rgba(0,212,255,0.3)"/>
    <circle cx="1500" cy="450" r="1" fill="rgba(124,58,237,0.3)"/>
  </g>

  <!-- ============ DATA FLOW PATHS (curved) ============ -->
  <g opacity="0.1">
    <path d="M100,100 Q400,200 700,150 T1300,200 T1800,120" stroke="rgba(0,212,255,0.3)" stroke-width="0.8" fill="none"/>
    <path d="M100,950 Q400,850 700,900 T1300,870 T1800,950" stroke="rgba(124,58,237,0.25)" stroke-width="0.8" fill="none"/>
    <path d="M50,400 Q300,350 500,420 T900,380" stroke="rgba(16,185,129,0.2)" stroke-width="0.6" fill="none"/>
    <path d="M1920,600 Q1650,550 1400,620 T1000,580" stroke="rgba(245,158,11,0.2)" stroke-width="0.6" fill="none"/>
  </g>

  <!-- ============ CORNER FRAME DECORATIONS ============ -->
  <g opacity="0.2">
    <!-- Top-left -->
    <path d="M30,30 L100,30 M30,30 L30,100" stroke="rgba(0,212,255,0.5)" stroke-width="1" fill="none"/>
    <circle cx="30" cy="30" r="2" fill="rgba(0,212,255,0.6)"/>

    <!-- Top-right -->
    <path d="M1890,30 L1820,30 M1890,30 L1890,100" stroke="rgba(124,58,237,0.5)" stroke-width="1" fill="none"/>
    <circle cx="1890" cy="30" r="2" fill="rgba(124,58,237,0.6)"/>

    <!-- Bottom-left -->
    <path d="M30,1050 L100,1050 M30,1050 L30,980" stroke="rgba(16,185,129,0.5)" stroke-width="1" fill="none"/>
    <circle cx="30" cy="1050" r="2" fill="rgba(16,185,129,0.6)"/>

    <!-- Bottom-right -->
    <path d="M1890,1050 L1820,1050 M1890,1050 L1890,980" stroke="rgba(245,158,11,0.5)" stroke-width="1" fill="none"/>
    <circle cx="1890" cy="1050" r="2" fill="rgba(245,158,11,0.6)"/>
  </g>

  <!-- ============ BINARY / DATA RAIN (subtle text) ============ -->
  <g opacity="0.04" font-family="monospace" font-size="10" fill="rgba(0,212,255,0.8)">
    <text x="60" y="300">01101001</text>
    <text x="1800" y="250">10110100</text>
    <text x="60" y="750">11001010</text>
    <text x="1800" y="800">01010111</text>
    <text x="400" y="980">01110011</text>
    <text x="1500" y="980">10001101</text>
    <text x="400" y="60">11010110</text>
    <text x="1200" y="60">01001011</text>
  </g>
</svg>

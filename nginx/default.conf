# ============================================================
# AI Command Center - Nginx Configuration
# ============================================================
# DNS SETUP:
#   1. Replace "portal.example.com" with your actual domain name
#   2. If you don't have a domain yet, keep "_" to accept all hostnames
#   3. For HTTPS, add an ssl server block (see commented example below)
# ============================================================

server {
    listen 80;

    # ── Replace with your domain name (or keep _ for any hostname) ──
    server_name portal.example.com;   # e.g. ai.mycompany.com

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # No caching - always serve fresh files
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    add_header Pragma "no-cache";
    expires -1;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}

